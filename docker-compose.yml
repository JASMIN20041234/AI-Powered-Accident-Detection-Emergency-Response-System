version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     sentinel
      POSTGRES_PASSWORD: sentinel_pass
      POSTGRES_DB:       sentinel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel -d sentinel_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:       production
      PORT:           5000
      DATABASE_URL:   postgresql://sentinel:sentinel_pass@postgres:5432/sentinel_db
      JWT_SECRET:     ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL:     http://localhost:5173
      SMS_PROVIDER:   ${SMS_PROVIDER:-callmebot}
      CALLMEBOT_ENDPOINT: https://api.callmebot.com/whatsapp.php
      TWILIO_ACCOUNT_SID:  ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:   ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      LOG_LEVEL:      info
    ports:
      - '5000:5000'

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
